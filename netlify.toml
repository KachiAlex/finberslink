[build]
  command = "yarn install --no-frozen-lockfile && yarn prisma generate && yarn prisma migrate deploy && yarn next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  PRISMA_CLI_BINARY_TARGETS = "native,debian-openssl-3.0.x,rhel-openssl-3.0.x"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  # Netlify auto-installs this plugin during build - no need to add to package.json
