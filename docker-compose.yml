version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: finberslink-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finbers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finbers}
      POSTGRES_DB: ${POSTGRES_DB:-finbers_local}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-finbers}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
